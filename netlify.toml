# kaprera — static HTML/CSS/JS site, deployed from the repo root.
# /404.html is picked up automatically as the custom not-found page.

[build]
  publish = "."

# ── URLs ─────────────────────────────────────────────────────────────
# The previous (Next.js) deploy 301'd the old *.html addresses to clean
# URLs, and browsers cache permanent redirects — so clean URLs stay
# canonical: *.html keeps redirecting, and the clean URL serves the file
# via an internal rewrite. Reversing this would loop for anyone who
# cached the old 301s.

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/careers.html"
  to = "/careers"
  status = 301

[[redirects]]
  from = "/privacy-policy.html"
  to = "/privacy-policy"
  status = 301

[[redirects]]
  from = "/maintenance.html"
  to = "/maintenance"
  status = 301

[[redirects]]
  from = "/careers"
  to = "/careers.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/maintenance"
  to = "/maintenance.html"
  status = 200

# ── security headers ─────────────────────────────────────────────────
# Static site, HTTPS-only on Netlify. The pages use inline styles and
# scripts by design, so script-src/style-src carry 'unsafe-inline' —
# the policy's value is pinning every *external* origin (only Google
# Fonts) and locking frames, objects, base and form targets.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000"

# ── caching ──────────────────────────────────────────────────────────
# Netlify's default is max-age=0, must-revalidate — every view re-fetches
# every image. Case shots, brand assets, and the self-hosted fonts change
# rarely (and get new filenames when they do), so cache them for a year.

[[headers]]
  for = "/cases/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/branding/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The case shots get new filenames when they change, so immutable is safe —
# but the case-study *pages* and shared stylesheet are edited in place. Netlify
# applies the LAST matching rule, so: revalidate everything under /cases/ first,
# then re-pin the immutable image extensions after it (images win, pages don't).
[[headers]]
  for = "/cases/*/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/cases/case.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/cases/case.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/cases/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/cases/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/cases/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── indexing ─────────────────────────────────────────────────────────
# Belt-and-suspenders: the maintenance page already carries a noindex meta,
# add the header too so it can never be indexed even if linked or crawled.
[[headers]]
  for = "/maintenance"
  [headers.values]
    X-Robots-Tag = "noindex"
