<style>
  :root {

  /* ── buttons / toggles ── */
  .btn {
    display: inline-flex;
    align-items: center;

  .btn svg { transition: transform .3s var(--ease); }
  .btn:hover { transform: translateY(-2px); }
  .btn:hover svg { transform: translateX(4px); }
  html[lang="ar"] .btn svg { transform: scaleX(-1); }
  html[lang="ar"] .btn:hover svg { transform: scaleX(-1) translateX(4px); }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: var(--blue-dark); box-shadow: 0 12px 24px -8px rgba(0,140,193,0.55); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--hair); }
  .btn-ghost:hover { border-color: var(--blue); color: var(--blue); box-shadow: 0 10px 22px -10px rgba(0,0,0,0.18); }

  .btn-shine { position: relative; overflow: hidden; }
  .btn-shine::after {
    content: ""; position: absolute; top: 0; left: -75%;
    width: 50%; height: 100%; pointer-events: none;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: skewX(-20deg); transition: left .6s var(--ease);
  }
  .btn-shine:hover::after { left: 125%; }

  .theme-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--hair); background: transparent; color: var(--ink);
    cursor: pointer; flex-shrink: 0;
    transition: border-color .2s, color .2s, transform .25s var(--ease);
  }
  .theme-toggle:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); }
  .theme-toggle .sun { display: none; }
  .theme-toggle .moon { display: block; }
  html[data-theme="dark"] .theme-toggle .sun { display: block; }
  html[data-theme="dark"] .theme-toggle .moon { display: none; }

  .lang-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    height: 40px; padding: 0 14px; border-radius: 999px;
    border: 1px solid var(--hair); background: transparent; color: var(--ink);
    cursor: pointer; flex-shrink: 0; font-weight: 600; font-size: 14px;
    font-family: 'Inter', system-ui, sans-serif;
    transition: border-color .2s, color .2s, transform .25s var(--ease);

  .lang-toggle:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); }

  /* ── arabic / rtl ── */
  html[lang="ar"] body { font-family: 'Cairo', system-ui, -apple-system, sans-serif; }
  html[lang="ar"] .eyebrow,
  html[lang="ar"] .lang-toggle { font-family: 'Cairo', system-ui, sans-serif; }

  header.nav {

  header.nav.scrolled { border-bottom-color: var(--hair); box-shadow: 0 4px 24px rgba(0,0,0,0.04); }

  @media (max-width: 600px) { .back-link span { display: none; } }

  /* ── 404 hero ── */
  main.nf {
    position: relative;
    min-height: 100svh;
    display: flex; align-items: center;

  .nf-ghost {
    position: absolute;
    bottom: -6%;
    inset-inline-end: clamp(-30px, 2vw, 80px);
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(180px, 30vw, 420px);
    font-weight: 500;
    line-height: 1;
    color: rgba(0,140,193,0.08);
    pointer-events: none;
    user-select: none;
  }
  .nf-inner { position: relative; z-index: 1; padding: 80px 0; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    letter-spacing: 0.04em; color: var(--muted); margin-bottom: 18px;
    text-transform: lowercase;
  }
  .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); display: inline-block; }
  .nf h1 {
    max-width: 16ch;
    font-size: clamp(38px, 7vw, 72px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.04;
    text-transform: lowercase;
    margin-bottom: 18px;
  }
  .nf-lead { color: var(--muted); font-size: 18px; max-width: 52ch; margin-bottom: 36px; }
  .nf-actions { display: flex; flex-wrap: wrap; gap: 14px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
    html { scroll-behavior: auto; }
    .btn:hover, .btn:hover svg { transform: none; }
    .btn-shine::after { display: none; }
  }
</style>
<script>
  // apply saved/system theme + language before paint to avoid flash
  (function () {
    const saved = localStorage.getItem('theme');
    const dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (dark) document.documentElement.setAttribute('data-theme', 'dark');
    const lang = localStorage.getItem('lang') || 'en';
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  })();
</script>

<script>
  const root = document.documentElement;

  // ── dark mode toggle ──
  const themeToggle = document.getElementById('themeToggle');
  const syncTheme = () => themeToggle.setAttribute('aria-pressed', String(root.getAttribute('data-theme') === 'dark'));
  syncTheme();
  themeToggle.addEventListener('click', () => {
    const dark = root.getAttribute('data-theme') === 'dark';
    root.setAttribute('data-theme', dark ? 'light' : 'dark');
    localStorage.setItem('theme', dark ? 'light' : 'dark');
    syncTheme();
  });

  // ── language toggle (en / ar rtl) ──
  const langToggle = document.getElementById('langToggle');
  const langLabel = document.getElementById('langLabel');
  let currentLang = localStorage.getItem('lang') || 'en';
  let cairoLoaded = false;
  const loadArabicFont = () => {
    if (cairoLoaded) return;
    cairoLoaded = true;
    const l = document.createElement('link');
    l.rel = 'stylesheet';
    l.href = 'https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap';
    document.head.appendChild(l);
  };
  const applyLang = (lang) => {
    const ar = lang === 'ar';
    if (ar) loadArabicFont();
    currentLang = lang;
    root.lang = lang;
    root.dir = ar ? 'rtl' : 'ltr';
    document.title = ar ? 'الصفحة غير موجودة — كابريرا' : 'page not found — kaprera';
    document.querySelectorAll('[data-en]').forEach(el => {
      const t = el.getAttribute(ar ? 'data-ar' : 'data-en');
      if (t != null) el.textContent = t;
    });
    langLabel.textContent = ar ? 'EN' : 'ع';
    langToggle.setAttribute('aria-pressed', String(ar));
    localStorage.setItem('lang', lang);
  };
  langToggle.addEventListener('click', () => applyLang(currentLang === 'ar' ? 'en' : 'ar'));
  applyLang(currentLang);

  // ── header shadow on scroll ──
  const nav = document.getElementById('nav');
  const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 8);
  onScroll();
  window.addEventListener('scroll', onScroll, { passive: true });
</script>
